version: '3.8'

services:
  scraper:
    build: .
    environment:
      - DATABASE_URL=file:./data/odds.db
      - THE_ODDS_API_KEY=${THE_ODDS_API_KEY}
      - SCRAPE_INTERVAL_MINUTES=15
    volumes:
      - ./data:/app/data
    restart: unless-stopped

